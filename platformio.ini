; PlatformIO Project Configuration File
; Both ESP32-CAM and LED controller build from src/

; ---------------------------------------------------------------------------
; ESP32-CAM (camera + Claude API + web UI)
; ---------------------------------------------------------------------------
[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
upload_port = /dev/cu.usbserial-110
monitor_port = /dev/cu.usbserial-110
monitor_speed = 115200
build_src_filter = -<*> +<cam_main.cpp>
lib_deps = bblanchon/ArduinoJson@^7

[env:esp32cam_ota]
extends = env:esp32cam
upload_protocol = espota
upload_port = wook-or-woke-cam.local

; ---------------------------------------------------------------------------
; Lolin S3 LED Controller (8x WS2812 strips)
; ---------------------------------------------------------------------------
[env:esp32leds]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
build_src_filter = -<*> +<led_main.cpp>
lib_deps = fastled/FastLED

[env:esp32leds_ota]
extends = env:esp32leds
upload_protocol = espota
upload_port = wook-or-woke-leds.local
