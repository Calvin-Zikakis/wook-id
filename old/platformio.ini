; PlatformIO Project Configuration File
;
; Two build targets:
;   pio run -e esp32s3    → builds the LED controller (Lonely Binary ESP32-S3)
;   pio run -e esp32cam   → builds the camera/button module (ESP32-CAM)

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
lib_deps =
  fastled/FastLED @ ^3.7.0
  bblanchon/ArduinoJson @ ^7.0.0
build_src_filter = +<*> -<cam_main.cpp>

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> -<main.cpp>
